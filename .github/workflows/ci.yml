name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the suite is pure local script execution -- it needs no write scope
# and no secrets, so a fork PR runs identically (AC-4).
permissions:
  contents: read

# Rapid successive pushes to the same ref cancel the older in-progress run (AC-9).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  suite:
    name: hook suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Job-level wall backstop (AC-7). Anchored on the worst-case per-JOB sum, not run-all.sh's
    # per-test 300s cap. Observed local MSYS run-all.sh wall ~5.6 min (spawn-heavy); the full
    # three-piece suite on the slowest host lands well under this with generous CI headroom.
    timeout-minutes: 20
    strategy:
      # Don't cancel sibling OS legs when one fails -- a portability regression should show
      # WHICH platform broke, not mask the rest.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # macOS only (AC-6). Prepend a shim so a bare `bash` resolves to stock /bin/bash 3.2.57
      # ahead of any Homebrew bash 5. run-all.sh invokes each test via bare `bash "$t"`, so
      # controlling PATH makes BOTH the aggregator AND every inner test interpreter 3.2 -- the
      # version proof below then binds to the interpreter that actually runs the tests, not a
      # top-level echo. Keyed on matrix.os (not the host-context alias) to keep the leak-scan clean.
      - name: Force stock bash 3.2 onto PATH (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p /tmp/aal-bash32
          ln -sf /bin/bash /tmp/aal-bash32/bash
          echo /tmp/aal-bash32 >> "$GITHUB_PATH"

      - name: Prove bash 3.2 at the test-execution layer (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "bash resolves to: $(command -v bash)"
          echo "outer shell \$BASH_VERSION=$BASH_VERSION"
          inner=$(bash -c 'printf %s "$BASH_VERSION"')
          echo "inner bare-bash \$BASH_VERSION=$inner  (== run-all.sh's 'bash \"\$t\"' resolution)"
          case "$inner" in
            3.2.*) echo "AC-6 OK: test-execution interpreter is bash $inner" ;;
            *) echo "AC-6 FAIL: expected bash 3.2.x, got '$inner'"; exit 1 ;;
          esac

      - name: Hook fixture suite (run-all.sh)
        run: bash hooks/tests/run-all.sh

      - name: Installer smoke (first-run-test.sh)
        run: bash bin/first-run-test.sh

      # The scanner adds the runtime OS user as a forbidden pattern to catch the AUTHOR's real name
      # leaking into a shipped file. It now SKIPS that augmentation in CI at the source (it reads the
      # CI env var — sanitize-check.sh:55), because the hosted OS login is a generic service account
      # (`runner` / `runneradmin`) that occurs benignly across the tree. So the real runner env flows
      # straight through here with NO masking — the source guard, not a workflow-layer blank, is what
      # keeps the generic login from false-positiving. The static PATTERNS set is the real identity gate.
      - name: Leak scanner (sanitize-check.sh)
        run: bash bin/sanitize-check.sh

  lint:
    name: shell + workflow lint
    runs-on: ubuntu-latest
    # Static-analysis lane (R-shellcheck-gate). Runs in PARALLEL to the behavioral `suite`
    # matrix (no `needs:`), so it never blocks/delays the suite and vice-versa. ubuntu-latest
    # ships shellcheck preinstalled -- no install step for it.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # shellcheck (preinstalled on ubuntu runners). --shell=bash: every tracked .sh is
      # #!/usr/bin/env bash, so bash-only constructs ([[ ]], arrays) must NOT flag as POSIX
      # violations (AC-4). Policy (armed correctness codes / disabled noise) lives in the
      # repo-root .shellcheckrc, which shellcheck reads automatically when run from the root.
      # -z / -0: NUL-delimited file list, robust to any path.
      - name: shellcheck (all tracked .sh, --shell=bash)
        run: |
          shellcheck --version
          git ls-files -z '*.sh' | xargs -0 shellcheck --shell=bash

      # actionlint: validate the workflow YAML (runner labels, expressions, action refs, syntax).
      # Pinned version + published SHA256, verified fail-CLOSED before the binary runs (rule #8
      # supply-chain). -shellcheck= DISABLES actionlint's embedded shellcheck-of-run-blocks: the
      # standalone shellcheck step above owns shell linting under our single .shellcheckrc policy;
      # actionlint owns workflow-structure validation only (no double-lint / policy divergence).
      - name: actionlint (pinned + checksum, fail-closed)
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl -fsSL -o "$tarball" "$url"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" actionlint
          ./actionlint -color -shellcheck=
